# a summary about you
summary: |
  I am a passionate Software Engineer & Competitive Programming Enthusiast. During my undergraduate studies at [North South University](http://www.northsouth.edu/), I was extensively involved in competitive programming. During this period, I was a regular member of [NSU Problem Solvers](https://www.facebook.com/nsuproblemsolvers/) & I had the privilege to represent my university in various national & international programming contests.
  
  I joined [AppsCode Inc.](https://appscode.com/) as a Back-End engineer in December 2020. During this period, I have learned Git, Golang, Docker & currently learning Kubernetes.
  
  In general, I enjoy learning new tricks/techniques for solving problems & wondering how to apply them to solve some real-world problems. Besides that, I love listening to Music, Cycling & outdoor sports like Cricket, Football, etc.
  

